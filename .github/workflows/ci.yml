name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo clippy (deny warnings)
        working-directory: rust-core
        run: cargo clippy --all-targets -- -D warnings
      # Separate step, not folded into the one above: the wasm-bindgen
      # exports in lib.rs are behind `#[cfg(feature = "wasm")]`, so a
      # plain `cargo clippy --all-targets` never even compiles that
      # module -- it was only ever checked by whoever happened to run
      # `--features wasm` locally before committing. The e2e/parity
      # jobs don't cover this gap either: they use the wasm-pkg/*
      # files already committed to the repo rather than rebuilding wasm
      # from source, so a real compile error in the wasm-gated code
      # could reach main undetected without this.
      - name: cargo clippy --features wasm (deny warnings)
        working-directory: rust-core
        run: cargo clippy --all-targets --features wasm -- -D warnings
      - name: cargo test (unit + property/fuzz tests)
        working-directory: rust-core
        run: cargo test --all-targets

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Type-check
        working-directory: web
        run: npx tsc -b
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Build
        working-directory: web
        run: npm run build
      - name: Bundle size budget
        working-directory: web
        run: |
          # Budgets set with real headroom over the size at the time this
          # check was added (JS ~146.6 KiB gzipped, wasm ~54.2 KiB
          # gzipped) rather than the current size exactly, so ordinary
          # growth (a new pass, a new UI feature) doesn't trip this on
          # its own -- it's meant to catch a real regression (e.g.
          # accidentally bundling a heavy dependency), not to enforce
          # today's size forever.
          js_size=$(cat dist/assets/index-*.js | gzip -c | wc -c)
          wasm_size=$(cat dist/assets/*.wasm | gzip -c | wc -c)
          echo "JS bundle (gzipped): ${js_size} bytes"
          echo "wasm bundle (gzipped): ${wasm_size} bytes"
          js_budget=204800   # 200 KiB
          wasm_budget=81920  # 80 KiB
          fail=0
          if [ "$js_size" -gt "$js_budget" ]; then
            echo "::error::JS bundle exceeds budget (${js_size} > ${js_budget} bytes gzipped)"
            fail=1
          fi
          if [ "$wasm_size" -gt "$wasm_budget" ]; then
            echo "::error::wasm bundle exceeds budget (${wasm_size} > ${wasm_budget} bytes gzipped)"
            fail=1
          fi
          exit $fail

  parity:
    runs-on: ubuntu-latest
    needs: rust-tests
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Build release CLI
        working-directory: rust-core
        run: cargo build --release --bin golf
      - name: Rust ↔ TypeScript parity
        run: node scripts/parity-test.mjs
      - name: Golfing-power regression guard (ROADMAP.md Phase 0)
        run: node scripts/golf-size-budget.mjs

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Install Playwright's Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Build
        working-directory: web
        run: npm run build
      - name: End-to-end smoke test
        working-directory: web
        run: npm run e2e

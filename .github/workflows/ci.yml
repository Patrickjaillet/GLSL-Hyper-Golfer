name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo clippy (deny warnings)
        working-directory: rust-core
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test (unit + property/fuzz tests)
        working-directory: rust-core
        run: cargo test --all-targets

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Type-check
        working-directory: web
        run: npx tsc -b
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Build
        working-directory: web
        run: npm run build
      - name: Bundle size budget
        working-directory: web
        run: |
          # Budgets set with real headroom over the size at the time this
          # check was added (JS ~146.6 KiB gzipped, wasm ~54.2 KiB
          # gzipped) rather than the current size exactly, so ordinary
          # growth (a new pass, a new UI feature) doesn't trip this on
          # its own -- it's meant to catch a real regression (e.g.
          # accidentally bundling a heavy dependency), not to enforce
          # today's size forever.
          js_size=$(cat dist/assets/index-*.js | gzip -c | wc -c)
          wasm_size=$(cat dist/assets/*.wasm | gzip -c | wc -c)
          echo "JS bundle (gzipped): ${js_size} bytes"
          echo "wasm bundle (gzipped): ${wasm_size} bytes"
          js_budget=204800   # 200 KiB
          wasm_budget=81920  # 80 KiB
          fail=0
          if [ "$js_size" -gt "$js_budget" ]; then
            echo "::error::JS bundle exceeds budget (${js_size} > ${js_budget} bytes gzipped)"
            fail=1
          fi
          if [ "$wasm_size" -gt "$wasm_budget" ]; then
            echo "::error::wasm bundle exceeds budget (${wasm_size} > ${wasm_budget} bytes gzipped)"
            fail=1
          fi
          exit $fail

  parity:
    runs-on: ubuntu-latest
    needs: rust-tests
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Build release CLI
        working-directory: rust-core
        run: cargo build --release --bin golf
      - name: Rust ↔ TypeScript parity
        run: node scripts/parity-test.mjs
